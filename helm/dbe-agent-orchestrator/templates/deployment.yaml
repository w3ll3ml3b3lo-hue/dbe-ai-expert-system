apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dbe-agent-orchestrator.fullname" . }}
  labels:
    {{- include "dbe-agent-orchestrator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dbe-agent-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dbe-agent-orchestrator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dbe-agent-orchestrator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        # Secret references from Key Vault
        - name: COSMOS_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: {{ include "dbe-agent-orchestrator.fullname" . }}-secrets
              key: cosmos-endpoint
        - name: COSMOS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "dbe-agent-orchestrator.fullname" . }}-secrets
              key: cosmos-key
        - name: AZURE_ML_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: {{ include "dbe-agent-orchestrator.fullname" . }}-secrets
              key: azure-ml-endpoint
        - name: AZURE_ML_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "dbe-agent-orchestrator.fullname" . }}-secrets
              key: azure-ml-key
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ include "dbe-agent-orchestrator.fullname" . }}-secrets
              key: storage-connection-string
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        # Mount tmpfs for temp files
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
